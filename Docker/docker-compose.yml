services:
  backend:
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mailcatcher:
        condition: service_started
    hostname: backend
    build:
      context: ..
      dockerfile: src/Backend/Dockerfile
    image: sso:dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - jwt_key=<your-64-long-key>
      - jwt_issuer=SSO
      - jwt_audience=SSO
      - jwt_expiration=24
      - hangfire_redis_name=SSO
      - hangfire_redis_host=redis
      - hangfire_redis_port=6379
      - hangfire_redis_database=0
      - "hangfire_redis_prefix=sso:hangfire:"
      - db_mysql_name=SSO
      - db_mysql_host=mysql
      - db_mysql_port=3306
      - db_mysql_user=root
      - db_mysql_password=root
      - db_mysql_database=SSO
      - smtp_enabled=true
      - smtp_host=mailcatcher
      - smtp_port=1025
      - smtp_username=sso@saveapis.com
      - smtp_password=sso
      - smtp_enable_ssl=false
    ports:
      - "80:80"
  redis:
    hostname: redis
    image: redis:8.0-M02-alpine3.20
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 5s
      timeout: 5s
      retries: 3
  mysql:
    hostname: mysql
    image: mysql:9.1.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=SSO
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -proot" ]
      interval: 15s
      timeout: 10s
      retries: 3
  mailcatcher:
    hostname: mailcatcher
    image: dockage/mailcatcher:0.9.0
    ports:
      - "81:1080"
      - "25:1025"
    volumes:
      - mailcatcher-data:/var/mail

volumes:
  redis-data:
  mysql-data:
  mailcatcher-data: