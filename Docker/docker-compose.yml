services:
  backend:
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    image: sso:dev
    build:
      context: ..
      dockerfile: src/Backend/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ELASTICSEARCH_NAME=sso
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - HANGFIRE_REDIS_NAME=sso
      - HANGFIRE_REDIS_HOST=redis
      - HANGFIRE_REDIS_PORT=6379
      - HANGFIRE_REDIS_DATABASE=0
      - JWT_ISSUER=sso
      - JWT_AUDIENCE=sso
      - JWT_SECRET=youRandomStringWith64OrMoreCharactersAndShouldNotBeSharedWithUnknown
      - JWT_EXPIRATION_IN_HOURS=24
      - EASYCACHING_REDIS_HOST=redis
      - EASYCACHING_REDIS_PORT=6379
      - EASYCACHING_REDIS_DATABASE=1
      - EASYCACHING_REDIS_BUS_DATABASE=2
      - MYSQL_HOST=mysql
      - MYSQL_USER=sso
      - MYSQL_PASSWORD=sso
      - MYSQL_DATABASE=sso
    ports:
      - "80:80"
  redis:
    image: redis:7.4.1-bookworm
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
  mysql:
    image: mysql:9.1.0
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_USER: sso
      MYSQL_PASSWORD: sso
      MYSQL_DATABASE: sso
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 3s
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false"
    healthcheck:
      test: curl -s http://elasticsearch:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 10s
      retries: 50
  kibana:
    image: docker.elastic.co/kibana/kibana:8.16.0
    ports:
      - "5601:5601"
    volumes:
      - kibana:/usr/share/kibana/data
    environment:
      - "ELASTICSEARCH_URL=http://elasticsearch:9200"
volumes:
  redis:
  mysql:
  elasticsearch:
  kibana: